<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rule34 App</title>
  <!-- CSS Externos: Font Awesome, jQuery UI e Bootstrap -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <style>
    /* ===================================================
       Variáveis de Cores e Temas
    =================================================== */
    :root {
      --primary-bg: #1a1a1a;
      --secondary-bg: #262626;
      --tertiary-bg: #383838;
      --card-bg: #262626;
      --accent: #ff4489;
      --text-light: #e0e0e0;
      --text-muted: #bbb;
      --hover-bg: #3a3a3a;
      --active-bg: #333;
    }

    /* ===================================================
       Reset e Base
    =================================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Roboto", sans-serif;
      background-color: var(--primary-bg);
      color: var(--text-light);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ===================================================
       Layout Principal
    =================================================== */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .content-wrapper {
      flex: 1;
      overflow: hidden;
    }

    /* ===================================================
       Navbar
    =================================================== */
    .navbar {
      background: var(--secondary-bg);
      padding: 5px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1050;
      border-bottom: 2px solid var(--tertiary-bg);
    }
    .navbar-brand {
      color: var(--text-light);
      font-size: 1.6rem;
      text-decoration: none;
    }

    /* ===================================================
       Navegação por Abas
    =================================================== */
    .tab-container {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .tab-header {
      display: none;
    }
    @media (min-width: 768px) {
      .tab-header {
        display: flex;
        background-color: var(--secondary-bg);
        border-bottom: 1px solid #444;
        justify-content: center;
      }
      .tab-header button {
        flex: 1;
        padding: 12px 0;
        border: none;
        background: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1rem;
        transition: background-color 0.3s, transform 0.2s;
      }
      .tab-header button:hover {
        background-color: var(--hover-bg);
        transform: scale(1.03);
      }
      .tab-header button.active {
        background-color: var(--active-bg);
        color: var(--text-light);
      }
    }

    /* ===================================================
       Área de Conteúdo com Slides
    =================================================== */
    .tab-content-container {
      flex: 1;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .tab-content {
      flex: 0 0 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow-y: auto;
      padding: 15px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .tab-content.visible {
      opacity: 1;
    }

    /* ===================================================
       Cards e Componentes Internos
    =================================================== */
    .card {
      background-color: var(--card-bg);
      border: none;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      margin-bottom: 20px;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    .media-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background-color: #000;
    }
    .media-container img,
    .media-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-body {
      padding: 15px;
    }
    .tag-list {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===================================================
       Inputs e Botões
    =================================================== */
    .form-select,
    .form-control {
      background-color: var(--secondary-bg) !important;
      border: 1px solid var(--tertiary-bg) !important;
      color: var(--text-light) !important;
    }
    .form-control:focus,
    .form-select:focus {
      box-shadow: none;
      border-color: var(--accent) !important;
    }
    .btn-custom {
      background-color: var(--active-bg);
      border: none;
      color: var(--text-light);
      border-radius: 5px;
      padding: 8px 12px;
      transition: background-color 0.3s, transform 0.2s;
      margin-right: 5px;
    }
    .btn-custom:hover {
      background-color: #444;
      transform: translateY(-1px);
    }
    .favorite-btn.active {
      color: var(--accent);
    }

    /* ===================================================
       Barra de Navegação Inferior (Mobile)
    =================================================== */
    .bottom-nav {
      background: var(--secondary-bg);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0;
      position: sticky;
      bottom: 0;
      z-index: 1050;
      border-top: 2px solid var(--tertiary-bg);
      border-bottom: 2px solid var(--tertiary-bg);
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      transition: color 0.3s;
    }
    .bottom-nav button.active {
      color: var(--text-light);
    }

    /* ===================================================
       Modal Customizado
    =================================================== */
    .modal-content {
      background-color: var(--secondary-bg);
      color: var(--text-light);
      border: none;
      border-radius: 10px;
    }
    .modal-header,
    .modal-body {
      border: none;
    }
    .btn-close {
      filter: invert(1);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Navbar -->
    <nav class="navbar">
      <a class="navbar-brand" href="#"><i class="fa-solid fa-fire" style="color: var(--accent);"></i>    R34</a>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="content-wrapper">
      <div class="tab-container">
        <!-- Abas para Desktop -->
        <div class="tab-header d-none d-md-flex">
          <button class="tab-button active" data-tab="feed"><i class="fas fa-rss"></i> Feed</button>
          <button class="tab-button" data-tab="search"><i class="fas fa-search"></i> Buscar</button>
          <button class="tab-button" data-tab="favorites"><i class="fas fa-heart"></i> Favoritos</button>
          <button class="tab-button" data-tab="settings"><i class="fas fa-cog"></i> Configurações</button>
          <button class="tab-button" data-tab="history"><i class="fas fa-history"></i> Histórico</button>
        </div>

        <!-- Container de Conteúdo com Slides -->
        <div class="tab-content-container">
          <!-- Aba Feed -->
          <div id="feed" class="tab-content">
            <div class="container-fluid">
              <select id="filter-type" class="form-select mb-3">
                <option value="">Todos</option>
                <option value="image">Imagens</option>
                <option value="video">Vídeos</option>
              </select>
              <div class="row" id="feed-container"></div>
              <div id="loading" class="text-center my-3" style="display: none">Carregando...</div>
              <div class="text-center">
                <button id="load-more" class="btn-custom">Carregar mais</button>
              </div>
            </div>
          </div>
          <!-- Aba Buscar -->
          <div id="search" class="tab-content">
            <div class="container-fluid">
              <form id="search-form" class="mb-3">
                <div class="input-group">
                  <input type="text" class="form-control" placeholder="Digite as tags (ex: tag1 tag2)" id="search-input" />
                  <button class="btn-custom btn" type="submit">Buscar</button>
                </div>
              </form>
              <div class="row" id="search-results"></div>
              <div id="loading-search" class="text-center my-3" style="display: none">Carregando...</div>
              <div class="text-center">
                <button id="load-more-search" class="btn-custom" style="display: none">Carregar mais</button>
              </div>
            </div>
          </div>
          <!-- Aba Favoritos -->
          <div id="favorites" class="tab-content">
            <div class="container-fluid">
              <h5>Favoritos</h5>
              <select id="sort-favorites" class="form-select mb-3">
                <option value="date">Por Data</option>
                <option value="tags">Por Tags</option>
              </select>
              <div class="row" id="favorites-container"></div>
            </div>
          </div>
          <!-- Aba Configurações -->
          <div id="settings" class="tab-content">
            <div class="container-fluid">
              <h5>Configurações</h5>
              <button id="clear-history" class="btn-custom mb-2">Limpar Histórico</button>
              <button id="clear-favorites" class="btn-custom mb-2">Limpar Favoritos</button>
              <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" id="dark-mode" checked />
                <label class="form-check-label" for="dark-mode">Modo Escuro</label>
              </div>
            </div>
          </div>
          <!-- Aba Histórico -->
          <div id="history" class="tab-content">
            <div class="container-fluid">
              <h5>Histórico de Busca</h5>
              <ul id="history-list" class="list-unstyled"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Barra de Navegação Inferior para Mobile -->
    <div class="bottom-nav d-md-none">
      <button class="tab-button active" data-tab="feed"><i class="fas fa-rss"></i></button>
      <button class="tab-button" data-tab="search"><i class="fas fa-search"></i></button>
      <button class="tab-button" data-tab="favorites"><i class="fas fa-heart"></i></button>
      <button class="tab-button" data-tab="settings"><i class="fas fa-cog"></i></button>
      <button class="tab-button" data-tab="history"><i class="fas fa-history"></i></button>
    </div>
  </div>

  <!-- Modal de Detalhes do Post -->
  <div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="postModalLabel">Detalhes do Post</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div class="media-container"></div>
          <p class="mt-3"><strong>Tags:</strong> <span id="modal-tags"></span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts Externos: jQuery, jQuery UI e Bootstrap Bundle -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function($) {
      'use strict';

      /* ===================================================
         Estado e Variáveis
      =================================================== */
      let currentPage = 0;
      let currentTags = "";
      let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

      /* ===================================================
         Helpers: API URL e Renderização da Mídia
      =================================================== */
      const getApiUrl = (tags, page) => {
        const tagParam = tags || "bacunng";
        return `https://api.rule34.xxx/index.php?page=dapi&s=post&q=index&json=1&tags=${tagParam}&pid=${page}&limit=20`;
      };

      const renderMedia = (fileUrl, tags) => {
        return (fileUrl.endsWith('.mp4') || fileUrl.endsWith('.webm'))
          ? `<video src="${fileUrl}" class="w-100 h-100" controls preload="metadata"></video>`
          : `<img src="${fileUrl}" class="w-100 h-100" alt="${tags}" loading="lazy">`;
      };

      /* ===================================================
         Renderização de Posts, Histórico e Favoritos
      =================================================== */
      const loadPosts = (containerId, tags = "", page = 0) => {
        const loadingSelector = containerId === "feed-container" ? "#loading" : "#loading-search";
        $(loadingSelector).show();
        $.get(getApiUrl(tags, page))
          .done(data => {
            const posts = data || [];
            posts.forEach(post => {
              const isFavorite = favorites.some(fav => fav.id === post.id);
              const mediaElement = renderMedia(post.file_url, post.tags);
              const card = `
                <div class="col-12 col-sm-6 col-md-4" data-post-id="${post.id}">
                  <div class="card">
                    ${mediaElement}
                    <div class="card-body">
                      <p class="tag-list">${post.tags}</p>
                      <button class="btn-custom download-btn" data-url="${post.file_url}">Baixar</button>
                      <button class="btn-custom fullscreen-btn">Tela Cheia</button>
                      <button class="btn-custom favorite-btn ${isFavorite ? "active" : ""}" data-id="${post.id}">
                        <i class="fas fa-heart"></i>
                      </button>
                      <button class="btn-custom share-btn" data-url="${post.file_url}">Compartilhar</button>
                    </div>
                  </div>
                </div>
              `;
              $(`#${containerId}`).append(card);
            });
            if (containerId === "search-results" && posts.length > 0) {
              $("#load-more-search").show();
            }
          })
          .fail(err => {
            console.error("Erro ao carregar posts:", err);
          })
          .always(() => {
            $(loadingSelector).hide();
          });
      };

      const updateHistory = () => {
        const history = JSON.parse(localStorage.getItem("history")) || [];
        const $historyList = $("#history-list").empty();
        history.forEach(tag => {
          $historyList.append(`
            <li data-tag="${tag}" class="d-flex justify-content-between align-items-center py-1 px-2 my-1 rounded">
              <span>${tag}</span>
              <button class="btn-custom remove-history" data-tag="${tag}">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </li>
          `);
        });
      };

      const updateFavorites = () => {
        const $favoritesContainer = $("#favorites-container").empty();
        favorites.forEach(fav => {
          const mediaElement = renderMedia(fav.file_url, fav.tags);
          const card = `
            <div class="col-12 col-sm-6 col-md-4" data-post-id="${fav.id}">
              <div class="card">
                ${mediaElement}
                <div class="card-body">
                  <p class="tag-list">${fav.tags}</p>
                  <button class="btn-custom download-btn" data-url="${fav.file_url}">Baixar</button>
                  <button class="btn-custom fullscreen-btn">Tela Cheia</button>
                  <button class="btn-custom favorite-btn active" data-id="${fav.id}">
                    <i class="fas fa-heart"></i>
                  </button>
                  <button class="btn-custom remove-favorite" data-id="${fav.id}">Remover</button>
                </div>
              </div>
            </div>
          `;
          $favoritesContainer.append(card);
        });
      };

      /* ===================================================
         Navegação entre Abas
      =================================================== */
      const switchTab = (tabName) => {
        const container = document.querySelector(".tab-content-container");
        const tabIndex = Array.from(document.querySelectorAll(".tab-content"))
          .findIndex(content => content.id === tabName);
        if (tabIndex >= 0) {
          container.scrollTo({
            left: container.offsetWidth * tabIndex,
            behavior: "smooth"
          });
        }
        $(".tab-button").removeClass("active");
        $(`.tab-button[data-tab="${tabName}"]`).addClass("active");
      };

      /* ===================================================
         Eventos e Bindings
      =================================================== */
      const bindEvents = () => {
        // Alternar entre abas
        $(".tab-button").on("click", function() {
          const tab = $(this).data("tab");
          switchTab(tab);
        });

        // Atualizar aba ativa ao rolar o conteúdo
        const tabContentContainer = document.querySelector(".tab-content-container");
        tabContentContainer.addEventListener("scroll", () => {
          const index = Math.round(tabContentContainer.scrollLeft / tabContentContainer.offsetWidth);
          $(".tab-button").removeClass("active");
          const activeTabId = document.querySelectorAll(".tab-content")[index].id;
          $(`.tab-button[data-tab="${activeTabId}"]`).addClass("active");
        });

        // Efeito fade-in com IntersectionObserver
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
            }
          });
        }, { threshold: 0.5 });
        document.querySelectorAll(".tab-content").forEach(content => observer.observe(content));

        // Carregar mais posts
        $("#load-more").on("click", () => {
          currentPage++;
          loadPosts("feed-container", currentTags, currentPage);
        });
        $("#load-more-search").on("click", () => {
          currentPage++;
          loadPosts("search-results", currentTags, currentPage);
        });

        // Filtro por tipo de mídia
        $("#filter-type").on("change", function() {
          const type = $(this).val();
          currentTags = type === "image" ? "-video" : type === "video" ? "video" : "";
          currentPage = 0;
          $("#feed-container").empty();
          loadPosts("feed-container", currentTags, currentPage);
        });

        // Busca por tags
        $("#search-form").on("submit", (e) => {
          e.preventDefault();
          currentTags = $("#search-input").val();
          currentPage = 0;
          $("#search-results").empty();
          $("#load-more-search").hide();
          loadPosts("search-results", currentTags);
          let history = JSON.parse(localStorage.getItem("history")) || [];
          if (currentTags && !history.includes(currentTags)) {
            history.push(currentTags);
            localStorage.setItem("history", JSON.stringify(history));
            updateHistory();
          }
        });

        // Autocomplete para tags
        $("#search-input").autocomplete({
          source: (request, response) => {
            $.get(`https://api.rule34.xxx/index.php?page=dapi&s=tag&q=index&name=${request.term}`, data => {
              const tags = $(data).find("tag").map(function() {
                return $(this).attr("name");
              }).get();
              response(tags);
            });
          },
          minLength: 2
        });

        // Limpar histórico
        $("#clear-history").on("click", () => {
          localStorage.removeItem("history");
          updateHistory();
        });

        // Remover item individual do histórico
        $(document).on("click", ".remove-history", function() {
          const tag = $(this).data("tag");
          let history = JSON.parse(localStorage.getItem("history")) || [];
          history = history.filter(h => h !== tag);
          localStorage.setItem("history", JSON.stringify(history));
          updateHistory();
        });

        // Limpar favoritos
        $("#clear-favorites").on("click", () => {
          favorites = [];
          localStorage.setItem("favorites", JSON.stringify(favorites));
          updateFavorites();
        });

        // Ordenar favoritos
        $("#sort-favorites").on("change", function() {
          const sortBy = $(this).val();
          if (sortBy === "date") {
            favorites.sort((a, b) => new Date(b.dateAdded || 0) - new Date(a.dateAdded || 0));
          } else if (sortBy === "tags") {
            favorites.sort((a, b) => a.tags.localeCompare(b.tags));
          }
          updateFavorites();
        });

        // Download da mídia
        $(document).on("click", ".download-btn", function() {
          const url = $(this).data("url");
          const link = document.createElement("a");
          link.href = url;
          link.download = url.split("/").pop();
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        });

        // Exibir mídia em tela cheia
        $(document).on("click", ".fullscreen-btn", function() {
          const media = $(this).closest(".card").find("img, video")[0];
          if (media && media.requestFullscreen) {
            media.requestFullscreen();
          }
        });

        // Favoritar ou desfavoritar post
        $(document).on("click", ".favorite-btn", function() {
          const postId = $(this).data("id");
          const $card = $(this).closest(".card");
          const post = {
            id: postId,
            file_url: $card.find(".download-btn").data("url"),
            tags: $card.find(".tag-list").text(),
            dateAdded: new Date()
          };
          if ($(this).hasClass("active")) {
            favorites = favorites.filter(fav => fav.id !== postId);
            $(this).removeClass("active");
          } else {
            favorites.push(post);
            $(this).addClass("active");
          }
          localStorage.setItem("favorites", JSON.stringify(favorites));
          updateFavorites();
        });

        // Remover favorito
        $(document).on("click", ".remove-favorite", function() {
          const postId = $(this).data("id");
          favorites = favorites.filter(fav => fav.id !== postId);
          localStorage.setItem("favorites", JSON.stringify(favorites));
          updateFavorites();
        });

        // Compartilhar mídia
        $(document).on("click", ".share-btn", function() {
          const url = $(this).data("url");
          if (navigator.share) {
            navigator.share({ title: "Rule34 Post", url });
          } else {
            alert("Copie o link: " + url);
          }
        });

        // Histórico interativo: clicar para buscar novamente
        $(document).on("click", "#history-list li", function(e) {
          if ($(e.target).hasClass("remove-history")) return;
          const tag = $(this).data("tag");
          $("#search-input").val(tag);
          $("#search-form").submit();
        });

        // Modal de detalhes ao clicar na card (exceto botões/ícones)
        $(document).on("click", ".card", function(e) {
          if ($(e.target).is("button, i")) return;
          const $card = $(this);
          const mediaUrl = $card.find(".download-btn").data("url");
          const tags = $card.find(".tag-list").text();
          const mediaElement = renderMedia(mediaUrl, tags);
          $("#postModal .media-container").html(mediaElement);
          $("#modal-tags").text(tags);
          $("#postModal").modal("show");
        });
      };

      /* ===================================================
         Inicialização do App
      =================================================== */
      const init = () => {
        loadPosts("feed-container");
        updateHistory();
        updateFavorites();
        bindEvents();
      };

      $(init);
    })(jQuery);
  </script>
</body>
</html>
